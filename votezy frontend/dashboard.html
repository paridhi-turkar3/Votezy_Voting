<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg"
     style="background: linear-gradient(to right, #8b0000, #f8caca)">

    <div class="container">

        <a class="navbar-brand text-white fw-bold"
           href="index.html">
            Votezy
        </a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link text-white" href="dashboard.html">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="voters.html">
                        Voters
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="candidates.html">
                        Candidates
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="voting.html">
                        Voting
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="results.html">
                        Results
                    </a>
                </li>

            </ul>
        </div>

    </div>

</nav>

<!-- Dashboard Cards -->
<div class="container mt-5">

    <h1 class="text-center text-danger mb-5">
        Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h4>Total Voters</h4>
                <h1 id="voterCount">0</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h4>Total Candidates</h4>
                <h1 id="candidateCount">0</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h4>Total Votes</h4>
                <h1 id="voteCount">0</h1>
            </div>
        </div>

    </div>

</div>

<!-- Vote Distribution Chart -->
<div class="container mt-5 mb-5">

    <div class="card shadow p-4">

        <h3 class="text-center text-danger mb-4">
            Vote Distribution
        </h3>

        <canvas id="voteChart"></canvas>

    </div>

</div>

<div class="container mt-5 mb-5">

    <div class="card shadow p-4">

        <h3 class="text-center text-danger mb-4">
            Candidate List
        </h3>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Candidate Name</th>
                    <th>Party</th>
                    <th>Votes Obtained</th>
                </tr>
            </thead>
            <tbody id="candidateList">
                <!-- Candidate rows will be populated here -->
            </tbody>
        </table>

    </div>

</div>

<!-- Winner Card -->
<div class="container mt-5 mb-5">

    <div class="card shadow p-4 text-center">

        <h3 class="text-warning">
            🏆 Current Leader
        </h3>

        <h2 id="winnerName">
            Loading...
        </h2>

        <h5 id="winnerParty">
            -
        </h5>

        <h4>
            Votes :
            <span id="winnerVotes">0</span>
        </h4>

    </div>

</div>



<script src="assets/js/dashboard.js"></script>

</body>
</html>
